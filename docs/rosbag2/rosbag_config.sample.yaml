# rosbag CLI 설정 샘플.
#
# 실행:
#   ros2 run rdfp rosbag list-episodes --config rosbag_config.yaml
#   ros2 run rdfp rosbag list-topics   --config rosbag_config.yaml
#   ros2 run rdfp rosbag topic-info /camera/image_raw --config rosbag_config.yaml
#
# rosbag CLI 는 rosbag 을 읽기 전용으로 조회하므로 DB 접속 정보(db 섹션)
# 와 MP4 출력 경로(output_mp4_dir) 는 필요하지 않다.


# ── 입력 경로 ─────────────────────────────────────────────────────
rosbag_dir: /data/rosbag


# ── 대상 토픽 화이트리스트 (비우면 rosbag 의 모든 토픽) ────────────
#   /session 은 자동 포함되므로 누락해도 무방하다.
#   list-episodes 의 split 후보 필터에만 사용되며, list-topics /
#   topic-info 는 rosbag 의 모든 토픽을 대상으로 한다.
topics: []


# ── 에피소드 필터 (list-episodes 전용) ─────────────────────────────
episode_filter:
  task_labels_include: []
  task_labels_exclude: []
  min_duration_sec: 0.0


# ── 세션 사전 필터 ─────────────────────────────────────────────────
session_filter:
  dates: []


# ── 운영 통합 (선택) ──────────────────────────────────────────────
catalog_index_path: null            # 예: /data/rosbag/_index.sqlite
